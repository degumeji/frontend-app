<div class="min-h-screen bg-gray-50">

  <nav class="bg-white shadow px-6 py-4 flex justify-between items-center">

    <div class="flex items-center space-x-8">

      <h1 class="text-xl font-bold text-gray-800">
        Sistema de Gestión
      </h1>

      <div class="hidden md:flex items-center space-x-6">

        <a routerLink="/"
           class="text-gray-600 hover:text-blue-600 font-medium transition-colors">
          Dashboard
        </a>

        <a routerLink="/clients"
           routerLinkActive="text-blue-600"
           class="text-gray-600 hover:text-blue-600 font-medium transition-colors">
          Clientes
        </a>

        <a routerLink="/create-order"
           class="text-gray-600 hover:text-blue-600 font-medium transition-colors">
          Nueva Orden
        </a>

        <a routerLink="/orders"
           class="text-gray-600 hover:text-blue-600 font-medium transition-colors">
          Órdenes
        </a>

      </div>
    </div>

    <button (click)="auth.logout()"
            class="bg-red-50 hover:bg-red-100 text-red-600 px-4 py-2 rounded-md font-medium transition-colors border border-red-200">
      Cerrar Sesión
    </button>

  </nav>

  <main class="container mx-auto p-8">

    <div class="mb-8">
      <h2 class="text-2xl font-bold text-gray-800">
        Mantenimiento de Clientes
      </h2>
      <p class="text-gray-600">
        Administrar clientes registrados en el sistema
      </p>
    </div>
    
    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 mb-8">

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">

        <input [(ngModel)]="client.firstName"
               class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
               placeholder="Nombre">

        <input [(ngModel)]="client.lastName"
               class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
               placeholder="Apellido">

        <input [(ngModel)]="client.email"
               class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
               placeholder="Email">

        <input [(ngModel)]="client.phone"
               class="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
               placeholder="Teléfono">

      </div>

      <div class="mt-6">
        <button (click)="save()"
                class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-medium transition-colors">
          Guardar Cliente
        </button>
      </div>

    </div>
    
    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">

      <table class="min-w-full divide-y divide-gray-200">

        <thead class="bg-gray-50">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase">
              ID
            </th>
            <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase">
              Nombre
            </th>
            <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase">
              Email
            </th>
            <th class="px-6 py-3 text-right text-xs font-semibold text-gray-500 uppercase">
              Acción
            </th>
          </tr>
        </thead>

        <tbody class="bg-white divide-y divide-gray-100">

          <tr *ngFor="let c of clients" class="hover:bg-gray-50 transition">

            <td class="px-6 py-4 text-sm text-gray-700">
              {{c.id}}
            </td>

            <td class="px-6 py-4 text-sm font-medium text-gray-800">
              {{c.firstName}} {{c.lastName}}
            </td>

            <td class="px-6 py-4 text-sm text-gray-600">
              {{c.email}}
            </td>

            <td class="px-6 py-4 text-right">
              <button (click)="delete(c.id)"
                      class="bg-red-50 hover:bg-red-100 text-red-600 px-4 py-1 rounded-md text-sm font-medium transition border border-red-200">
                Eliminar
              </button>
            </td>

          </tr>

        </tbody>

      </table>

    </div>

  </main>
</div>

<div *ngIf="showErrorModal"
     class="fixed inset-0 flex items-center justify-center bg-black bg-opacity-40 z-50">

  <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6 animate-fade-in">

    <div class="flex items-center space-x-3 mb-4">
      <div class="bg-red-100 text-red-600 rounded-full p-2">
        ⚠
      </div>
      <h3 class="text-lg font-semibold text-gray-800">
        Error
      </h3>
    </div>

    <p class="text-gray-600 mb-6">
      {{ errorMessage }}
    </p>

    <div class="text-right">
      <button (click)="closeModal()"
              class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg transition">
        Cerrar
      </button>
    </div>

  </div>
</div>
