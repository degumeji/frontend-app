<div class="flex min-h-screen items-center justify-center bg-gray-100">
  <div class="w-full max-w-md bg-white p-8 rounded shadow-md">
    <h2 class="text-2xl font-bold mb-6 text-center">Login (.NET + PHP)</h2>
    <form (ngSubmit)="onLogin()">
      <div class="mb-4">
        <label class="block text-gray-700">Usuario</label>
        <input type="text" [(ngModel)]="username" name="username" class="w-full p-2 border rounded" required>
      </div>
      <div class="mb-6">
        <label class="block text-gray-700">Contraseña</label>
        <input type="password" [(ngModel)]="password" name="password" class="w-full p-2 border rounded" required>
      </div>
      <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700">
        Ingresar
      </button>
    </form>
  </div>
</div>
